# CrowdHuman dataset https://www.crowdhuman.org/ by Megvii
# Documentation: https://docs.ultralytics.com/datasets/detect/crowdhuman/
# Example usage: yolo train data=CrowdHuman.yaml
# parent
# ├── ultralytics
# └── datasets
#     └── CrowdHuman downloads here (26 GB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: CrowdHuman # dataset root dir
train: images/train # train images (relative to 'path') 15000 images
val: images/val # val images (relative to 'path') 4370 images
test: images/test # test images (relative to 'path') 5000 images

# Classes
names:
  0: person

# Download script/URL (optional) ---------------------------------------------------------------------------------------
download: |
  import json
  import shutil
  from pathlib import Path

  from ultralytics.utils.downloads import download
  from ultralytics.utils import TQDM


  def crowdhuman_to_yolo(dir):
      """Convert CrowdHuman .odgt annotations to YOLO format.

      Uses full-body bounding boxes (fbox) for each person instance.
      Each .odgt file contains one JSON object per line with format:
          {"ID": "image_id", "gtboxes": [{"tag": "person", "fbox": [x, y, w, h], ...}, ...]}
      """
      for split in ("train", "val"):
          annot_file = dir / f"annotation_{split}.odgt"
          img_dir = dir / "images" / split
          label_dir = dir / "labels" / split
          label_dir.mkdir(parents=True, exist_ok=True)

          if not annot_file.exists():
              continue

          lines = annot_file.read_text().strip().splitlines()
          for line in TQDM(lines, desc=f"Converting {split} annotations"):
              data = json.loads(line)
              image_id = data["ID"]

              # Find image to get dimensions
              img_path = None
              for ext in (".jpg", ".jpeg", ".png"):
                  p = img_dir / f"{image_id}{ext}"
                  if p.exists():
                      img_path = p
                      break

              if img_path is None:
                  continue

              # Read image dimensions
              from PIL import Image

              with Image.open(img_path) as img:
                  img_w, img_h = img.size

              # Convert annotations
              labels = []
              for box in data.get("gtboxes", []):
                  if box.get("tag") != "person":
                      continue
                  # Skip ignored regions
                  extra = box.get("extra", {})
                  if extra.get("ignore", 0) == 1:
                      continue
                  # Use full-body bounding box (fbox): [x, y, w, h]
                  fbox = box.get("fbox")
                  if fbox is None:
                      continue
                  x, y, w, h = fbox
                  # Convert to YOLO format (normalized center x, y, w, h)
                  x_center = max(0, min(1, (x + w / 2) / img_w))
                  y_center = max(0, min(1, (y + h / 2) / img_h))
                  w_norm = max(0, min(1, w / img_w))
                  h_norm = max(0, min(1, h / img_h))
                  labels.append(f"0 {x_center:.6f} {y_center:.6f} {w_norm:.6f} {h_norm:.6f}\n")

              label_file = label_dir / f"{image_id}.txt"
              label_file.write_text("".join(labels))


  def move_images(src_dir, dst_dir):
      """Recursively find and move all image files from src_dir to dst_dir."""
      dst_dir.mkdir(parents=True, exist_ok=True)
      for ext in ("*.jpg", "*.jpeg", "*.png"):
          for f in src_dir.rglob(ext):
              shutil.move(str(f), str(dst_dir / f.name))


  # Download from HuggingFace (original author's upload)
  dir = Path(yaml["path"])  # dataset root dir
  hf_url = "https://huggingface.co/datasets/sshao0516/CrowdHuman/resolve/main"

  # Download annotation files
  download([f"{hf_url}/annotation_train.odgt", f"{hf_url}/annotation_val.odgt"], dir=dir)

  # Download and extract each zip to its own temp directory to avoid skipped extractions
  tmp = dir / "_tmp"
  for split, zips in [
      ("train", ["CrowdHuman_train01.zip", "CrowdHuman_train02.zip", "CrowdHuman_train03.zip"]),
      ("val", ["CrowdHuman_val.zip"]),
      ("test", ["CrowdHuman_test.zip"]),
  ]:
      for z in zips:
          zip_tmp = tmp / Path(z).stem
          zip_tmp.mkdir(parents=True, exist_ok=True)
          download([f"{hf_url}/{z}"], dir=zip_tmp)
          move_images(zip_tmp, dir / "images" / split)
          shutil.rmtree(zip_tmp)

  if tmp.exists():
      shutil.rmtree(tmp)

  # Convert annotations to YOLO format (test has no annotations)
  crowdhuman_to_yolo(dir)
